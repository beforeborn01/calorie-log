spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calorie_log_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  auth:
    mock-verify-code: "123456"
    mock-verify-code-enabled: true
  ai:
    mock-enabled: true
    baidu:
      api-key: ${BAIDU_AI_KEY:}
      secret-key: ${BAIDU_AI_SECRET:}
    doubao:
      api-key: ${DOUBAO_API_KEY:}
      endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
      model: ${DOUBAO_MODEL:doubao-pro-32k}
  social:
    invite-base-url: https://calorielog.cn/invite

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.calorielog: DEBUG
    org.springframework.security: DEBUG
