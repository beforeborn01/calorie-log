spring:
  application:
    name: calorie-log-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "CURRENT_TIMESTAMP"
      logic-not-delete-value: "NULL"
  mapper-locations: classpath*:mapper/**/*.xml

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-in-production-environment-00000000}
  access-token-expiry: 7200
  refresh-token-expiry: 604800
  issuer: calorie-log

wechat:
  mp:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}

volcengine:
  sms:
    access-key-id: ${VOLC_ACCESS_KEY_ID:}
    access-key-secret: ${VOLC_ACCESS_KEY_SECRET:}
    sign-name: ${VOLC_SMS_SIGN_NAME:}
    template-id: ${VOLC_SMS_TEMPLATE_ID:}

baidu:
  ai:
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.calorielog: DEBUG
